<div class="authority-panel authority-panel--security-center">
  <div class="authority-workbench">
    <header class="authority-workbench__bar">
      <div class="authority-workbench__brand">
        <div class="authority-workbench__title">扩展权限中心</div>
        <div class="authority-workbench__subtitle">Authority Archive · 权限合规与数据治理</div>
      </div>
      <nav class="authority-tabs">
        <button type="button" class="authority-tab" data-tab="overview">
          <svg class="authority-tab__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          <span class="authority-tab__label">总览</span>
        </button>
        <button type="button" class="authority-tab" data-tab="detail">
          <svg class="authority-tab__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
          <span class="authority-tab__label">扩展治理</span>
        </button>
        <button type="button" class="authority-tab" data-tab="databases">
          <svg class="authority-tab__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 3 4 5 9 5s9-2 9-5V5"/><path d="M3 12c0 3 4 5 9 5s9-2 9-5"/></svg>
          <span class="authority-tab__label">存储</span>
        </button>
        <button type="button" class="authority-tab" data-tab="activity">
          <svg class="authority-tab__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          <span class="authority-tab__label">活动</span>
        </button>
        <button type="button" class="authority-tab" data-tab="policies">
          <svg class="authority-tab__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>
          <span class="authority-tab__label">策略</span>
        </button>
        <button type="button" class="authority-tab" data-tab="updates">
          <svg class="authority-tab__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
          <span class="authority-tab__label">维护</span>
        </button>
      </nav>
      <div class="authority-workbench__actions">
        <div class="authority-health-badges" data-role="health-badges"></div>
        <button type="button" class="menu_button authority-primary-action" data-action="refresh">刷新</button>
      </div>
    </header>
    <div class="authority-alert-dock" data-role="status"></div>
    <div class="authority-workbench__body">
      <main class="authority-view-canvas">
        <section class="authority-section" data-section="overview">
          <div data-role="overview-view"></div>
        </section>
        <section class="authority-section" data-section="detail">
          <div class="authority-governance-shell">
            <div class="authority-governance-header">
              <div>
                <div class="authority-eyebrow">Extension Governance</div>
                <h2>扩展治理</h2>
                <p>监管、审计并约束所有接入扩展的访问权限。</p>
              </div>
              <div class="authority-governance-tools">
                <span class="authority-pill authority-pill--prompt" data-role="extension-count">0</span>
                <input class="authority-search" type="search" data-role="extension-search" placeholder="搜索扩展" />
              </div>
            </div>
            <div class="authority-governance-layout">
              <aside class="authority-extension-nav">
                <div class="authority-extension-nav__header">
                  <div>
                    <div class="authority-eyebrow">Directory</div>
                    <h3>扩展目录</h3>
                  </div>
                </div>
                <div class="authority-extension-nav__list" data-role="extension-list"></div>
              </aside>
              <div class="authority-governance-detail" data-role="detail-view"></div>
            </div>
          </div>
        </section>
        <section class="authority-section" data-section="databases">
          <div data-role="databases-view"></div>
        </section>
        <section class="authority-section" data-section="activity">
          <div data-role="activity-view"></div>
        </section>
        <section class="authority-section" data-section="policies">
          <div data-role="policies-view"></div>
        </section>
        <section class="authority-section" data-section="updates">
          <div data-role="updates-view"></div>
        </section>
      </main>
    </div>
  </div>
</div>
