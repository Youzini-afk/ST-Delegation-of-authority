name: Version Bump

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: authority-version-bump-main
  cancel-in-progress: false

jobs:
  bump-version:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Bump version
        run: npm run version:bump

      - name: Validate bumped sources
        run: |
          npm run typecheck
          npm run build --workspace @stdo/shared-types
          npm run build --workspace @stdo/server-plugin
          npm run build --workspace @stdo/sdk-extension
          npm run build --workspace @stdo/example-extension

      - name: Commit and push version update
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          $versionFiles = @(
            'package.json',
            'package-lock.json',
            'Cargo.lock',
            'crates/authority-core/Cargo.toml',
            'README.md',
            'packages/shared-types/package.json',
            'packages/shared-types/src/version.ts',
            'packages/server-plugin/package.json',
            'packages/server-plugin/src/version.ts',
            'packages/server-plugin/static/package.json',
            'packages/sdk-extension/package.json',
            'packages/sdk-extension/src/version.ts',
            'packages/sdk-extension/static/manifest.json',
            'packages/example-extension/package.json',
            'packages/example-extension/src/version.ts',
            'packages/example-extension/static/manifest.json'
          )
          git add -- $versionFiles
          $changes = git diff --cached --name-only
          if ([string]::IsNullOrWhiteSpace($changes)) {
            Write-Host 'No version changes detected.'
            exit 0
          }
          git commit -m "chore: bump version to $version"
          git push origin HEAD:main
