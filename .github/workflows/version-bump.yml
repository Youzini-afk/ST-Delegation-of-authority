name: Version Bump

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: authority-version-bump-main
  cancel-in-progress: false

jobs:
  bump-version:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Bump version
        run: npm run version:bump

      - name: Build project artifacts
        run: npm run build

      - name: Synchronize installable outputs
        run: node ./scripts/installable.mjs sync

      - name: Verify installable outputs
        run: npm run check:installable

      - name: Commit and push version update
        shell: pwsh
        run: |
          $changes = git status --porcelain
          if ([string]::IsNullOrWhiteSpace($changes)) {
            Write-Host 'No version changes detected.'
            exit 0
          }

          $version = node -p "require('./package.json').version"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: bump version to $version"
          git push origin HEAD:main
