<div class="authority-permission-dialog">
  <h3>扩展请求新的服务端权限</h3>
  <div class="authority-kv-grid">
    <div><strong>扩展名称</strong><div data-field="extension-name"></div></div>
    <div><strong>扩展 ID</strong><div data-field="extension-id"></div></div>
    <div><strong>能力域</strong><div data-field="resource"></div></div>
    <div><strong>目标</strong><div data-field="target"></div></div>
    <div><strong>风险等级</strong><div data-field="risk"></div></div>
  </div>
  <div class="authority-inline-note">
    <strong>请求说明</strong>
    <div data-field="reason"></div>
  </div>
  <div class="authority-inline-note">
    “拒绝并记住”会将该请求写入持久拒绝记录，后续只有在安全中心手动重置后才会重新弹出授权。
  </div>
</div>
